<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Broschüren — Fauna Mibaso</title>
<meta name="description" content="Anklickbare Broschüre zum Lesen und Mitnehmen: unsere heimischen Schmetterlinge.">
<meta name="theme-color" content="#233D5C">

<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../assets/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fauna Mibaso">

<style>
  :root{
    --blau:#233D5C; --blau-tief:#1a2f47; --blau-akzent:#5b7da0; --blau-blass:#b9c7d6;
    --creme:#F7F3E8; --creme-tief:#EEE7D5; --tinte:#1c2e42; --honig:#C28A3A;
    --linie:#d7cfba; --leise:#6b5340;
    --serif:'Iowan Old Style','Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--creme);
    color:var(--tinte);
    font-family:var(--serif);
    font-size:18px;line-height:1.55;
  }
  header.app-head{
    background:linear-gradient(180deg,var(--blau-tief) 0%,var(--blau) 100%);
    color:var(--creme);
    padding:24px 20px 22px;
    padding-top:max(24px,env(safe-area-inset-top));
    border-bottom:4px double var(--blau-akzent);
    text-align:center;
  }
  header.app-head h1{margin:0;font-size:1.8rem;font-weight:normal;letter-spacing:0.02em}
  header.app-head .untertitel{font-style:italic;color:var(--blau-blass);margin-top:4px;font-size:0.98rem}
  main{max-width:980px;margin:0 auto;padding:24px 20px 50px}
  .back{
    display:inline-block;margin-bottom:18px;
    color:var(--blau);text-decoration:none;font-size:0.98rem;
  }
  .back:hover{text-decoration:underline}
  .grid{
    display:grid;gap:18px;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  }
  .karte{
    display:flex;flex-direction:column;
    background:#fff;
    border:1px solid var(--linie);
    border-radius:16px;
    padding:22px 22px 20px;
    text-decoration:none;color:var(--tinte);
    box-shadow:0 2px 8px rgba(35,61,92,.06);
    transition:transform .15s, box-shadow .15s, border-color .15s;
  }
  .karte:hover,.karte:focus-visible{
    transform:translateY(-3px);
    box-shadow:0 8px 22px rgba(35,61,92,.16);
    border-color:var(--blau-akzent);
    outline:none;
  }
  .karte .pdf-icon{
    width:46px;height:46px;
    background:var(--creme-tief);
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    color:var(--honig);
    margin-bottom:12px;
    font-weight:600;font-size:0.78rem;letter-spacing:0.08em;
    font-family:'Helvetica Neue',Arial,sans-serif;
  }
  .karte h3{margin:0 0 6px;font-size:1.2rem;color:var(--blau);font-weight:600}
  .karte p{margin:0;color:var(--leise);font-size:0.95rem;line-height:1.4}
  footer.app-foot{
    text-align:center;
    padding:22px 20px 30px;
    padding-bottom:max(30px,env(safe-area-inset-bottom));
    color:var(--leise);font-size:0.86rem;
    border-top:1px solid var(--linie);
    background:var(--creme-tief);
  }
  footer.app-foot a{color:var(--blau)}
</style>
</head>
<body>

<header class="app-head">
  <h1>Broschüren</h1>
  <div class="untertitel">Zum Lesen und Mitnehmen</div>
</header>

<main>
  <a class="back" href="../">‹ Zurück zur Startseite</a>

  <div class="grid">
    <a class="karte" href="schmetterlinge.pdf">
      <div class="pdf-icon">PDF</div>
      <h3>Schmetterlinge</h3>
      <p>Anklickbare Broschüre über unsere heimischen Schmetterlinge — ein Streifzug durch die Welt der Falter.</p>
    </a>
  </div>
</main>

<footer class="app-foot">
  <p>Hinweise und Korrekturen: <a href="mailto:mibaur@me.com">mibaur@me.com</a></p>
  <p>© 2026 Michael Baur · Fauna Mibaso</p>
</footer>

<script src="../assets/app.js" defer></script>
</body>
</html>
