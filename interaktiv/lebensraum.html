<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Was brauchen Insekten wirklich? — Lernpfad · Fauna Mibaso</title>
<meta name="description" content="Lernpfad: Welcher Lebensraum passt zu welcher Tiergruppe? Vier Bilder – nur eines stimmt.">
<meta name="theme-color" content="#233D5C">
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<style>
  :root{
    --blau:#233D5C; --blau-tief:#1a2f47; --creme:#F7F3E8; --creme-tief:#EEE7D5;
    --pergament:#EDE3CC; --tinte:#1c2e42; --honig:#C28A3A; --linie:#c3ccd5;
    --gruen:#3E9A5E; --rot:#B5482F;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:var(--creme);color:var(--blau);
    font-family:Georgia,"Times New Roman",serif;line-height:1.5;
    padding-top:calc(env(safe-area-inset-top) + min(2vh,14px));}
  .huelle{max-width:600px;margin:0 auto;padding:clamp(8px,2.5vw,16px) clamp(12px,3.5vw,26px) 48px;}

  .kopf{display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:var(--sans);}
  .zurueck{font-size:13px;font-weight:600;color:var(--blau);text-decoration:none;display:inline-flex;gap:5px;align-items:center;}
  .zaehler{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#8a96a1;}
  .zaehler b{color:var(--honig);}
  h1{font-size:clamp(19px,4.8vw,26px);line-height:1.08;margin:6px 0 10px;font-weight:normal;}

  .balken{height:6px;background:var(--creme-tief);border-radius:3px;overflow:hidden;margin:0 0 14px;}
  .balken div{height:100%;width:0;background:var(--honig);transition:width .3s;}

  .frage{font-size:clamp(16.5px,4.4vw,20px);font-weight:normal;margin:0 0 12px;}

  /* 2×2-Bildquiz */
  .bildquiz{position:relative;width:min(96%,440px);aspect-ratio:1/1;margin:0 auto;}
  .bildquiz>img{width:100%;height:100%;object-fit:cover;border-radius:14px;display:block;border:1px solid var(--linie);background:var(--pergament);}
  .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
    background:var(--pergament);border:1px dashed #cdbf9e;border-radius:14px;padding:18px;
    font-family:var(--sans);font-size:12.5px;color:#a99a78;}
  .feld{position:absolute;width:50%;height:50%;border:none;background:transparent;cursor:pointer;padding:0;}
  .feld[data-pos="A"]{top:0;left:0;} .feld[data-pos="B"]{top:0;right:0;}
  .feld[data-pos="C"]{bottom:0;left:0;} .feld[data-pos="D"]{bottom:0;right:0;}
  .feld .rahmen{position:absolute;inset:7px;border-radius:10px;border:4px solid transparent;transition:border-color .15s;}
  .feld .badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);opacity:0;
    width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:var(--sans);font-weight:700;font-size:24px;transition:opacity .2s,transform .2s;}
  .feld.richtig .rahmen{border-color:var(--gruen);}
  .feld.richtig .badge{background:var(--gruen);opacity:1;transform:translate(-50%,-50%) scale(1);}
  .feld.falsch .rahmen{border-color:var(--rot);}
  .feld.falsch .badge{background:var(--rot);opacity:1;transform:translate(-50%,-50%) scale(1);}
  .bildquiz:not(.beantwortet) .feld:hover .rahmen{border-color:rgba(194,138,58,.6);}

  .infokarte{margin-top:14px;padding:13px 15px;border-radius:0 12px 12px 0;background:var(--creme-tief);
    border-left:4px solid var(--honig);display:none;}
  .infokarte.an{display:block;}
  .infokarte .it{font-family:var(--sans);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin:0 0 4px;}
  .infokarte.ok .it{color:var(--gruen);} .infokarte.no .it{color:var(--rot);}
  .infokarte p{margin:0;font-size:14.5px;color:var(--tinte);}

  .nav{display:flex;justify-content:flex-end;margin-top:18px;}
  .weiter{display:none;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--creme);
    background:var(--blau);border:none;border-radius:999px;padding:12px 22px;cursor:pointer;}
  .weiter:hover{background:var(--blau-tief);} .weiter.an{display:inline-block;}

  /* Ende */
  .ende{text-align:center;padding:8px 0;}
  .ende .gross{font-family:Georgia,serif;font-size:clamp(40px,12vw,60px);line-height:1;color:var(--blau);margin:6px 0 2px;}
  .ende .gross small{font-size:.4em;color:#8a96a1;}
  .ende .spruch{font-size:clamp(16px,4.6vw,19px);margin:10px auto 16px;max-width:30ch;}
  .ende .knoepfe{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .knopf{font-family:var(--sans);font-size:14px;font-weight:600;border-radius:999px;padding:12px 20px;cursor:pointer;
    border:1px solid var(--blau);}
  .knopf.prim{background:var(--blau);color:var(--creme);border:none;} .knopf.prim:hover{background:var(--blau-tief);}
  .knopf.sek{background:transparent;color:var(--blau);text-decoration:none;display:inline-block;}

  footer{margin-top:30px;font-family:var(--sans);font-size:12px;color:#8a96a1;text-align:center;}
  footer a{color:inherit;}

  .konffeld{position:fixed;inset:0;z-index:9999;pointer-events:none;overflow:hidden;}
  .konf{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:konffall 3.6s linear forwards;}
  @keyframes konffall{0%{transform:translateY(-14px);opacity:1;}100%{transform:translateY(106vh) rotate(540deg);opacity:.9;}}
  @media (prefers-reduced-motion:reduce){.konf{display:none;}*{transition:none!important;}}
</style>
</head>
<body>
<div class="huelle">
  <div class="kopf">
    <a class="zurueck" href="../index.html">‹ Startseite</a>
    <span class="zaehler" id="zaehler"></span>
  </div>
  <h1>Was brauchen Insekten wirklich?</h1>

  <div id="spiel">
    <div class="balken"><div id="balken"></div></div>
    <h2 class="frage" id="frage"></h2>
    <div class="bildquiz" id="bildquiz"></div>
    <div class="infokarte" id="info"></div>
    <div class="nav"><button class="weiter" id="weiter">Weiter ›</button></div>
  </div>

  <div id="ende" style="display:none;"></div>

  <footer>© 2026 <a href="../ueber/" style="color:inherit;">Michael Baur</a> · Fauna Mibaso</footer>
</div>

<script>
/* ===========================================================================
   Lernpfad „Was brauchen Insekten wirklich?"
   Pro Station: 1 quadratisches Bild mit 2×2-Teilbildern (A oben-links,
   B oben-rechts, C unten-links, D unten-rechts). Antippen → richtig/falsch,
   Auflösung, weiter. Bilder gehören nach ../images/lebensraum/.
=========================================================================== */
const BASIS="../images/lebensraum/";

const DATEN = [
  { chip:"Libellen",
    frage:"Welches Gewässer ist für Libellenlarven am günstigsten?",
    bild:"07-libellen.jpg", richtig:"A",
    aufloesung:"Libellen brauchen strukturreiches, besonntes Wasser mit Pflanzen und flachen Zonen. Vorsicht beim Fischteich: Fische fressen die Larven leer – ein hübscher Teich kann trotzdem libellenleer sein." },
  { chip:"Schmetterlinge",
    frage:"Was braucht ein Schmetterlingsgarten am dringendsten zusätzlich zu Nektar?",
    bild:"02-schmetterlinge.jpg", richtig:"C",
    aufloesung:"Nektar füttert nur die Falter. Ohne Raupen-Futterpflanzen wie Brennnesseln gibt es keine nächste Generation – und gefüllte Zierblüten liefern oft gar keinen Pollen." },
  { chip:"Heuschrecken",
    frage:"Welche Fläche ist für Heuschrecken am wertvollsten?",
    bild:"04-heuschrecken.jpg", richtig:"B",
    aufloesung:"Entscheidend sind Wärme und Struktur: ein magerer, sonniger Hang mit Horsten, offenen Bodenstellen für die Eiablage und stehen gelassenem Altgras. Kurzrasen und dichtes Gestrüpp bieten das nicht." },
  { chip:"Käfer",
    frage:"Was ist für viele Käfer im Wald entscheidend?",
    bild:"03-kaefer-totholz.jpg", richtig:"A",
    aufloesung:"Etwa ein Viertel unserer Käfer entwickelt sich im morschen Holz. Stehendes und liegendes, teils besonntes Totholz ist Gold wert – aufgeräumte Wälder, Mulch und Monokulturen bieten kaum welches." },
  { chip:"Marienkäfer",
    frage:"Wie hilfst du Marienkäfern & Florfliegen am meisten?",
    bild:"05-marienkaefer.jpg", richtig:"C",
    aufloesung:"Sie überwintern in Laub, hohlen Stängeln und Reisig – ihre Larven brauchen Blattläuse als Futter. Etwas „Unordnung“ stehen lassen und keine Insektizide: So bleibt die gratis Schädlingspolizei." },
  { chip:"Hummel-Nest",
    frage:"Wo legt eine Hummelkönigin am liebsten ihr Nest an?",
    bild:"01-hummel-nest.jpg", richtig:"A",
    aufloesung:"Hummeln sind Hohlraumnister: Die Königin bezieht im Frühjahr am liebsten verlassene Mäusenester oder Erdhöhlen. Bohrloch-„Hotels“ sind für Solitärbienen, frei hängende Waben bauen nur Honigbienen und Wespen." },
  { chip:"Schwebfliegen",
    frage:"Was macht einen Garten für Schwebfliegen wertvoll?",
    bild:"09-schwebfliegen.jpg", richtig:"C",
    aufloesung:"Die erwachsenen Schwebfliegen brauchen offen zugängliche Blüten (Dolden, Körbchen) – ihr kurzer Rüssel kommt nicht in tiefe Röhren. Und ihre Larven sind Blattlausjäger: ein paar geduldete Läuse statt Gift = Schädlingspolizei." },
  { chip:"Glühwürmchen",
    frage:"Was braucht ein Garten, damit Glühwürmchen sich ansiedeln?",
    bild:"08-gluehwuermchen.jpg", richtig:"B",
    aufloesung:"Ihre Larven sind Schnecken-Jäger – ohne Schnecken keine Glühwürmchen. Sie brauchen feuchte, dunkle, ungemähte Ecken; Schneckenkorn nimmt die Beute, Licht und Trockenheit vertreiben sie." },
  { chip:"Nisthilfe",
    frage:"Welche Nisthilfe nehmen Wildbienen wirklich an?",
    bild:"06-wildbienen-hotel.jpg", richtig:"C",
    aufloesung:"Wildbienen brauchen glatte, runde Gänge (2–9 mm) in Hartholz oder festen Halmen, sonnig ausgerichtet. Bunte Deko-Hotels und grobe, ausgefranste Bohrungen bleiben leer – Splitter verletzen sogar die Flügel." }
];

const $=id=>document.getElementById(id);
const reduce=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
let i=0, score=0, beantwortet=false;

function render(){
  beantwortet=false;
  const s=DATEN[i];
  $("zaehler").innerHTML="Station "+(i+1)+" / "+DATEN.length+" · ✓ <b>"+score+"</b>";
  $("balken").style.width=(i/DATEN.length*100)+"%";
  $("frage").textContent=s.frage;
  let html='<img src="'+BASIS+s.bild+'" alt="Vier Situationen zur Auswahl" '+
    'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">'+
    '<div class="ph" style="display:none">Bild folgt:<br>images/lebensraum/'+s.bild+'</div>';
  ["A","B","C","D"].forEach(p=>{
    html+='<button class="feld" data-pos="'+p+'" aria-label="Bild '+p+'"><span class="rahmen"></span><span class="badge"></span></button>';
  });
  $("bildquiz").innerHTML=html;
  $("bildquiz").classList.remove("beantwortet");
  $("info").className="infokarte"; $("info").innerHTML="";
  $("weiter").classList.remove("an");
  $("weiter").textContent=(i===DATEN.length-1)?"Zum Ergebnis ›":"Weiter ›";
  $("bildquiz").querySelectorAll(".feld").forEach(b=>{
    b.addEventListener("click",()=>waehle(b,s));
  });
}

function waehle(btn,s){
  if(beantwortet) return; beantwortet=true;
  $("bildquiz").classList.add("beantwortet");
  const gewaehlt=btn.dataset.pos, korrekt=(gewaehlt===s.richtig);
  const felder=$("bildquiz").querySelectorAll(".feld");
  felder.forEach(f=>{
    if(f.dataset.pos===s.richtig){ f.classList.add("richtig"); f.querySelector(".badge").textContent="✓"; }
  });
  if(!korrekt){ btn.classList.add("falsch"); btn.querySelector(".badge").textContent="✗"; }
  if(korrekt) score++;
  $("zaehler").innerHTML="Station "+(i+1)+" / "+DATEN.length+" · ✓ <b>"+score+"</b>";
  const info=$("info");
  info.className="infokarte an "+(korrekt?"ok":"no");
  info.innerHTML='<p class="it">'+(korrekt?"✓ Richtig":"✗ Richtig wäre "+s.richtig)+'</p><p>'+s.aufloesung+'</p>';
  $("weiter").classList.add("an");
}

$("weiter").addEventListener("click",()=>{
  if(i<DATEN.length-1){ i++; render(); window.scrollTo({top:0,behavior:reduce?"auto":"smooth"}); }
  else ende();
});

function ende(){
  $("spiel").style.display="none";
  $("balken")&&($("balken").style.width="100%");
  const perfekt=score===DATEN.length;
  const sprueche = perfekt
    ? ["Alles richtig – du weißt, was unsere Insekten brauchen! 🌱","Volltreffer! Ein echter Lebensraum-Kenner."]
    : score>=Math.ceil(DATEN.length*0.6)
      ? ["Stark! Fast alles richtig.","Gut gemacht – schon ein guter Blick fürs Detail."]
      : ["Schau ruhig nochmal genau hin – Struktur und Wasser sind oft der Schlüssel.","Ein guter Anfang! Noch eine Runde?"];
  const e=$("ende"); e.style.display="block";
  e.innerHTML='<div class="ende"><p class="zaehler" style="font-family:var(--sans);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8a96a1;">Ergebnis</p>'+
    '<p class="gross">'+score+'<small> / '+DATEN.length+'</small></p>'+
    '<p class="spruch">'+sprueche[Math.floor(Math.random()*sprueche.length)]+'</p>'+
    '<div class="knoepfe"><button class="knopf prim" id="nochmal">Nochmal</button>'+
    '<a class="knopf sek" href="../index.html">Zur Startseite</a></div></div>';
  $("nochmal").addEventListener("click",()=>{ i=0; score=0; $("ende").style.display="none"; $("spiel").style.display="block"; render(); });
  if(perfekt){ konfetti(); fanfare(); }
}

function konfetti(){
  if(reduce) return;
  const feld=document.createElement("div"); feld.className="konffeld";
  const farben=['#C28A3A','#233D5C','#3E9A5E','#e8a020','#9b59b6','#e74c3c'];
  for(let n=0;n<70;n++){
    const k=document.createElement("span"); k.className="konf";
    k.style.cssText='left:'+Math.random()*100+'%;background:'+farben[(Math.random()*farben.length)|0]+
      ';animation-delay:'+(Math.random()*0.5).toFixed(2)+'s;transform:rotate('+(Math.random()*360)+'deg);';
    feld.appendChild(k);
  }
  document.body.appendChild(feld); setTimeout(()=>feld.remove(),4200);
}
function fanfare(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;
    const ctx=new Ctx(); if(ctx.state==="suspended") ctx.resume();
    const t0=ctx.currentTime+0.05;
    [[523.25,0,0.16,0.2],[659.25,0.15,0.16,0.2],[783.99,0.30,0.16,0.2],[1046.5,0.46,0.6,0.22]]
    .forEach(([fr,st,du,vo])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="triangle";o.frequency.value=fr;
      g.gain.setValueAtTime(0,t0+st);g.gain.linearRampToValueAtTime(vo,t0+st+0.02);g.gain.exponentialRampToValueAtTime(0.001,t0+st+du);
      o.connect(g).connect(ctx.destination);o.start(t0+st);o.stop(t0+st+du+0.05);});
    setTimeout(()=>ctx.close().catch(()=>{}),1600);
  }catch(e){}
}

render();
</script>
<script src="../assets/app.js" defer></script>
</body>
</html>
