<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Der große Fauna-Test – quer durch alle Themen</title>
<meta name="description" content="Der große Fauna-Test: gemischte Fragen aus der ganzen App – Tiere erkennen, Verwandte finden, Naturwissen und die Lernpfade Verwandlung & Bestäubung.">
<meta name="theme-color" content="#233D5C">
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<style>
  :root{
    --blau:#233D5C; --blau-tief:#1a2f47; --creme:#F7F3E8; --creme-tief:#EEE7D5;
    --tinte:#1c2e42; --honig:#C28A3A; --linie:#d7cfba; --gruen:#3E9A5E; --rot:#B5482F;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:var(--creme);color:var(--blau);
    font-family:Georgia,"Times New Roman",serif;line-height:1.5;}
  .huelle{max-width:640px;margin:0 auto;padding:clamp(14px,4vw,30px) clamp(12px,3.5vw,26px) 56px;}

  .kopf{display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:var(--sans);}
  .home{font-size:13px;font-weight:600;color:var(--blau);text-decoration:none;display:inline-flex;gap:5px;align-items:center;}
  .status{font-size:12.5px;color:#6f7b86;}
  .uhr{font-weight:700;color:var(--blau);} .uhr.knapp{color:var(--rot);}
  h1{font-size:clamp(24px,6.5vw,36px);margin:10px 0 14px;font-weight:normal;}

  .box{background:#fff;border:1px solid var(--linie);border-radius:18px;
    padding:clamp(16px,4vw,24px);box-shadow:0 2px 10px rgba(35,61,92,.06);}
  .box>p.intro{font-size:clamp(15px,4vw,17px);color:var(--tinte);margin:0 0 18px;}

  .modi{display:flex;flex-direction:column;gap:11px;}
  .modus{display:flex;flex-direction:column;gap:3px;text-align:left;font-family:var(--sans);cursor:pointer;
    background:var(--creme-tief);border:1px solid var(--linie);border-radius:14px;padding:15px 17px;transition:.14s;}
  .modus:hover:not(:disabled){border-color:var(--honig);transform:translateY(-1px);}
  .modus:disabled{opacity:.5;cursor:default;}
  .modus strong{color:var(--blau);font-size:1.04rem;}
  .modus span{color:#6f7b86;font-size:.85rem;}

  #frage{display:none;}
  .fort-wrap{height:6px;background:var(--creme-tief);border-radius:3px;overflow:hidden;margin:0 0 16px;}
  #fort{height:100%;width:0;background:var(--honig);transition:width .3s;}
  .chip{display:inline-block;font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;color:var(--honig);margin:0 0 8px;}
  #fragetext{font-size:clamp(17px,4.6vw,21px);margin:0 0 14px;font-weight:normal;}
  #foto-wrap{display:none;margin:0 0 14px;text-align:center;position:relative;}
  #foto-wrap img{max-width:100%;max-height:46vh;border-radius:14px;border:1px solid var(--linie);background:var(--creme-tief);}
  #foto-spinner{display:flex;align-items:center;justify-content:center;height:200px;
    font-family:var(--sans);font-size:13px;color:#9aa6b0;}

  #antworten{display:flex;flex-direction:column;gap:9px;}
  #antworten.zweispaltig{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .antwort{font-family:var(--sans);font-size:14.5px;color:var(--blau);background:#fff;text-align:left;
    border:1.5px solid var(--linie);border-radius:13px;padding:13px 15px;cursor:pointer;transition:.12s;}
  .antwort:hover:not(:disabled){border-color:#9bb0c6;}
  .antwort em{font-style:italic;color:#8a96a1;font-size:12px;}
  .antwort.richtig{background:#e6efe7;border-color:var(--gruen);color:#2f6a45;}
  .antwort.falsch{background:#f2e2dd;border-color:var(--rot);color:#9a3f2a;}
  .antwort:disabled{cursor:default;}
  .antwort.mit-bild{padding:0;overflow:hidden;display:flex;flex-direction:column;}
  .antwort.mit-bild img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--creme-tief);display:block;}
  .antwort .bildname{padding:8px 10px;font-size:13px;}

  #feedback{font-family:var(--sans);font-size:14px;margin:14px 0 0;min-height:1.2em;}
  #feedback.ok{color:var(--gruen);font-weight:600;}
  #feedback.fehler{color:var(--rot);}
  #weiter{display:none;margin:16px 0 0;font-family:var(--sans);font-size:14px;font-weight:600;
    color:var(--creme);background:var(--blau);border:none;border-radius:999px;padding:12px 22px;cursor:pointer;}
  #weiter:hover{background:var(--blau-tief);}

  #ergebnis{display:none;text-align:center;position:relative;}
  #ergebnis h2{font-weight:normal;font-size:clamp(20px,5vw,26px);margin:4px 0 6px;}
  #score{font-family:Georgia,serif;font-size:clamp(40px,12vw,62px);line-height:1;color:var(--blau);margin:4px 0;}
  .sieger{font-family:var(--sans);font-size:15px;color:#2f6a45;background:#e6efe7;border-radius:12px;
    padding:11px 14px;margin:10px 0;}
  #ergebnis-msg{font-size:15px;color:var(--tinte);margin:8px 0 16px;}
  .bereiche{text-align:left;display:flex;flex-direction:column;gap:12px;margin:14px 0 18px;}
  .bz{display:grid;grid-template-columns:1fr auto;gap:3px 10px;font-family:var(--sans);}
  .bz .bn{font-size:13.5px;font-weight:600;color:var(--blau);}
  .bz .bw{font-size:13.5px;color:#6f7b86;}
  .bz .bwrap{grid-column:1 / -1;height:7px;background:var(--creme-tief);border-radius:4px;overflow:hidden;}
  .bz .bbar{height:100%;width:0;background:var(--honig);}
  .bz .buben{grid-column:1 / -1;font-size:12px;color:#6f7b86;}
  .bz .buben a{color:var(--honig);text-decoration:none;font-weight:600;}
  .btn{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--creme);background:var(--blau);
    border:none;border-radius:999px;padding:13px 24px;cursor:pointer;}
  .btn:hover{background:var(--blau-tief);}

  .fuss{font-family:var(--sans);font-size:12px;color:#8a93a0;text-align:center;margin-top:22px;}

  /* Feuerwerk */
  #feuerwerk{display:none;position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:5;}
  .funke{position:absolute;width:8px;height:8px;border-radius:50%;opacity:0;
    animation:funke-flug 1.3s ease-out forwards;}
  @keyframes funke-flug{0%{transform:translate(0,0) scale(1);opacity:1;}
    100%{transform:translate(var(--dx),var(--dy)) scale(.3);opacity:0;}}
  @media (prefers-reduced-motion:reduce){.funke{display:none;}*{transition:none!important;}}
  body{padding-top:env(safe-area-inset-top);}
</style>
</head>
<body>
<div class="huelle">
  <div class="kopf">
    <a class="home" href="../">‹ Startseite</a>
    <span class="status" id="status"></span>
  </div>
  <h1>🐝 Der große Fauna-Test</h1>

  <div class="box">
    <!-- START -->
    <div id="start">
      <p class="intro">Einmal quer durch die ganze App: Tiere erkennen, Verwandte finden, Naturwissen – und Fragen aus den Lernpfaden „Verwandlung“ und „Wer bestäubt was?“. Wie viel bleibt hängen?</p>
      <div class="modi">
        <button class="modus" disabled data-m="kurz"><strong>Kurzer Test</strong><span>9 Fragen · ca. 3 Minuten · ohne Zeitdruck</span></button>
        <button class="modus" disabled data-m="standard"><strong>Standard-Test</strong><span>15 Fragen · ca. 5 Minuten · ohne Zeitdruck</span></button>
        <button class="modus" disabled data-m="blitz"><strong>Blitz-Test</strong><span>5 Minuten Countdown · so viele Fragen wie möglich</span></button>
      </div>
    </div>

    <!-- FRAGE -->
    <div id="frage">
      <div class="fort-wrap"><div id="fort"></div></div>
      <span class="chip" id="chip"></span>
      <p id="fragetext"></p>
      <div id="foto-wrap"><div id="foto-spinner">Lädt …</div>
        <img id="foto" alt="Tierfoto" style="opacity:0;display:none" onload="fotoGeladen()" onerror="fotoFehler()"></div>
      <div id="antworten"></div>
      <div id="feedback"></div>
      <button id="weiter">Weiter ›</button>
    </div>

    <!-- ERGEBNIS -->
    <div id="ergebnis">
      <div id="feuerwerk" aria-hidden="true"></div>
      <h2>Ergebnis</h2>
      <div id="score"></div>
      <div id="sieger-platz"></div>
      <p id="ergebnis-msg"></p>
      <div class="bereiche" id="bereiche"></div>
      <button class="btn" id="neu">Auf ein Neues! 🐝</button>
    </div>
  </div>

  <p class="fuss">© 2026 Michael Baur · Fauna Mibaso</p>
</div>

<script>
/* ════════════ DATEN ════════════ */
let ARTEN=[], FOTO_ARTEN=[];
let GRUPP_COUNT={}, MEHRHEITS_GRUPPEN=[];

/* Naturwissen – Insekten & niedere Tiere */
const WISSEN=[
{"q":"Wie viele Beine hat ein erwachsenes Insekt?","opts":["Sechs","Acht","Vier","Zehn"],"ans":0},
{"q":"Aus welchen drei Abschnitten besteht ein Insektenkörper?","opts":["Kopf, Brust, Hinterleib","Kopf, Bauch, Schwanz","Vorderteil, Mittelteil, Beine","Kopf, Rumpf, Flügel"],"ans":0},
{"q":"Warum sind Spinnen keine Insekten?","opts":["Sie haben acht Beine und keine Fühler","Sie können nicht fliegen","Sie leben im Boden","Sie haben einen Panzer"],"ans":0},
{"q":"Welche Tiergruppe hat die meisten Arten auf der Erde?","opts":["Käfer","Säugetiere","Vögel","Fische"],"ans":0},
{"q":"Womit „atmen“ Insekten?","opts":["Durch feine Röhren (Tracheen) im Körper","Mit einer Lunge","Über Kiemen","Durch die Haut allein"],"ans":0},
{"q":"Warum müssen sich Insekten häuten, um zu wachsen?","opts":["Ihr festes Außenskelett wächst nicht mit","Sie verlieren sonst die Farbe","Damit sie fliegen können","Gegen Fressfeinde"],"ans":0},
{"q":"Wie erzeugt ein Glühwürmchen sein Licht?","opts":["Durch eine chemische Reaktion im Hinterleib","Es spiegelt Mondlicht","Durch Reibung der Flügel","Mit Wärme aus den Muskeln"],"ans":0},
{"q":"Wozu leuchten weibliche Glühwürmchen?","opts":["Um Männchen anzulocken","Um Beute zu blenden","Zur Wärme","Um den Weg zu finden"],"ans":0},
{"q":"Wie verständigen sich Honigbienen über gute Futterquellen?","opts":["Mit einem Schwänzeltanz","Durch lautes Summen","Über Farben","Durch Berührung der Fühler"],"ans":0},
{"q":"Was fressen Marienkäfer besonders gern?","opts":["Blattläuse","Blütenblätter","Holz","Andere Käfer"],"ans":0},
{"q":"Was verraten die Punkte auf einem Marienkäfer?","opts":["Nichts über das Alter – die Zahl gehört zur Art","Sein Alter in Jahren","Wie oft er gefressen hat","Sein Geschlecht"],"ans":0},
{"q":"Wie zirpt eine Feldheuschrecke?","opts":["Sie reibt die Hinterschenkel an den Flügeln","Mit der Stimme","Durch Flügelschlagen","Mit den Fühlern"],"ans":0},
{"q":"Wo leben die Larven der Libellen?","opts":["Im Wasser","In der Erde","Im Holz","In Blüten"],"ans":0},
{"q":"Womit saugt ein Schmetterling Nektar?","opts":["Mit einem aufrollbaren Rüssel","Mit Beißzangen","Mit den Füßen","Mit den Fühlern"],"ans":0},
{"q":"Was wird aus einer Schmetterlingsraupe?","opts":["Nach der Puppe ein Falter","Sofort ein Falter","Ein Käfer","Eine zweite Raupe"],"ans":0},
{"q":"Womit sehen Insekten – oft mit Tausenden Linsen?","opts":["Mit Facettenaugen","Mit einem großen Auge","Über die Fühler","Mit der Haut"],"ans":0},
{"q":"Wozu dienen die Fühler (Antennen) eines Insekts?","opts":["Zum Riechen und Tasten","Zum Fliegen","Zum Beißen","Zur Verdauung"],"ans":0},
{"q":"Welche Insekten leben in großen Staaten zusammen?","opts":["Ameisen, Bienen und Wespen","Käfer","Libellen","Schmetterlinge"],"ans":0},
{"q":"Sind Asseln Insekten?","opts":["Nein, sie sind Krebstiere","Ja","Sie sind Spinnen","Sie sind Würmer"],"ans":0},
{"q":"Zu welcher großen Gruppe gehören Schnecken und Muscheln?","opts":["Weichtiere","Gliederfüßer","Würmer","Insekten"],"ans":0},
{"q":"Welchen Nutzen hat der Regenwurm im Boden?","opts":["Er lockert und durchlüftet die Erde","Er frisst Wurzeln","Er bestäubt Pflanzen","Er vertreibt Schädlinge"],"ans":0},
{"q":"Wie viele Flügelpaare hat eine Fliege (Zweiflügler)?","opts":["Eines – das zweite ist zu Schwingkölbchen umgebaut","Zwei","Drei","Keines"],"ans":0},
{"q":"Warum sind viele Wespen schwarz-gelb gefärbt?","opts":["Als Warnfarbe vor ihrem Stachel","Zur Tarnung","Wegen der Wärme","Um Partner zu finden"],"ans":0},
{"q":"Was ist Mimikry – etwa bei der Schwebfliege?","opts":["Eine harmlose Art ahmt eine wehrhafte nach","Tarnung im Laub","Das Nachahmen von Geräuschen","Eine Häutung"],"ans":0},
{"q":"Welche Rolle spielen Insekten für viele Blütenpflanzen?","opts":["Sie bestäuben die Blüten","Sie fressen die Wurzeln","Sie spenden Schatten","Sie düngen den Boden"],"ans":0},
{"q":"Was passiert oft, wenn eine Insektenart verschwindet?","opts":["Auch abhängige Pflanzen und Tiere geraten in Not","Nichts","Nur weniger Lärm","Mehr Blüten"],"ans":0},
{"q":"Was ist ein Bestäuber?","opts":["Ein Tier, das Pollen von Blüte zu Blüte trägt","Eine Pflanze","Ein Pilz","Ein Vogelnest"],"ans":0},
{"q":"Womit verteidigt sich der Ohrwurm – trotz seines Namens harmlos?","opts":["Mit der Zange am Hinterleib","Mit Gift","Mit den Flügeln","Mit Lauten"],"ans":0},
{"q":"Wie überwintern Falter wie das Tagpfauenauge oft?","opts":["Als erwachsener Falter in Schuppen und Kellern","Als Ei im Wasser","Sie sterben alle","Als fliegender Schwarm"],"ans":0},
{"q":"Was ist die Imago bei einem Insekt?","opts":["Das fertige, erwachsene Tier","Das Ei","Die Larve","Die Puppe"],"ans":0}
];

/* Lernpfad „Verwandlung“ */
const VERWANDLUNG=[
{"q":"Was bedeutet „vollständige Verwandlung“?","opts":["Ei → Larve → Puppe → fertiges Insekt","Ei → Nymphe → Insekt","Larve → sofort Falter","Nur Häuten, kein Umbau"],"ans":0},
{"q":"Welches Tier verwandelt sich OHNE Puppe?","opts":["Libelle","Schmetterling","Käfer","Biene"],"ans":0},
{"q":"Wie heißt das Jugendstadium bei der unvollständigen Verwandlung?","opts":["Nymphe","Puppe","Raupe","Engerling"],"ans":0},
{"q":"Was geschieht in der Puppe?","opts":["Der Körper wird fast völlig umgebaut","Das Tier schläft nur","Es wächst ein zweiter Kopf","Nichts Besonderes"],"ans":0},
{"q":"Welche Gruppe gehört NICHT zu den Tieren mit Puppe?","opts":["Heuschrecken","Schmetterlinge","Käfer","Fliegen"],"ans":0},
{"q":"Die Raupe ist beim Schmetterling das …","opts":["Larvenstadium","erwachsene Tier","Ei","Puppenstadium"],"ans":0},
{"q":"Bei welcher Verwandlung ähnelt das Junge schon dem erwachsenen Tier?","opts":["Bei der unvollständigen (ohne Puppe)","Bei der vollständigen (mit Puppe)","Bei beiden gleich","Bei keiner"],"ans":0},
{"q":"Worin steckt der ganze Unterschied der beiden Wege?","opts":["In der Puppe","In der Eizahl","In der Flügelfarbe","In der Beinzahl"],"ans":0}
];

/* Lernpfad „Wer bestäubt was?“ */
const BESTAEUBUNG=[
{"q":"Tiefe Lippenblüten wie der Wiesensalbei werden vor allem bestäubt von …","opts":["Hummeln & Bienen","Fliegen","Käfern","Wind"],"ans":0},
{"q":"Welche Bestäuber fliegen in der Dämmerung und folgen dem Duft?","opts":["Nachtfalter & Schwärmer","Tagfalter","Marienkäfer","Libellen"],"ans":0},
{"q":"Warum sind viele nachts bestäubte Blüten weiß?","opts":["Weiß leuchtet im Dunkeln und ist gut sichtbar","Weiß speichert Wärme","Weiß enthält mehr Nektar","Weiß schützt vor Regen"],"ans":0},
{"q":"Flache Doldenblüten wie die Wilde Möhre passen zu …","opts":["Fliegen & Schwebfliegen mit kurzem Rüssel","Schwärmern mit langem Rüssel","nur Hummeln","Nachtfaltern"],"ans":0},
{"q":"Warum haben viele Tagfalter-Blüten lange, enge Röhren?","opts":["Nur ein langer Falterrüssel erreicht den Nektar","Damit sie stabil stehen","Zum Wasserspeichern","Gegen Kälte"],"ans":0},
{"q":"Was können Bienen sehen, das wir nicht wahrnehmen?","opts":["Ultraviolettes Licht (Saftmale)","Röntgenstrahlen","Wärmebilder","Im Dunkeln wie am Tag"],"ans":0},
{"q":"Welche Farbe können Bienen NICHT sehen?","opts":["Rot","Blau","Gelb","Violett"],"ans":0},
{"q":"Wie fängt der Aronstab seine Bestäuber?","opts":["In einer Kesselfalle, gelockt mit Aas-Geruch","Mit klebrigem Nektar","Mit einem Netz","Mit Dornen"],"ans":0},
{"q":"Das Prinzip „Schlüssel & Schloss“ bei der Bestäubung bedeutet …","opts":["Blütenform und Bestäuber passen genau zusammen","Blüten öffnen nur mit Schlüssel","Jede Biene hat einen Schlüssel","Blüten schließen nachts ab"],"ans":0},
{"q":"Welche Blüten bestäuben Käfer bevorzugt?","opts":["Weit offene, schalige Blüten wie die Hundsrose","Tiefe enge Röhren","Hängende Glocken","Nur weiße Nachtblüher"],"ans":0}
];

/* Bereiche für die Auswertung */
const BEREICHE={
  art:        {name:"Tiere erkennen",   ueben:"tierquiz.html",          uebenName:"Tierquiz"},
  fam:        {name:"Verwandte finden", ueben:"verwandte-finden.html",  uebenName:"Verwandte finden"},
  wissen:     {name:"Naturwissen",      ueben:"../index.html",          uebenName:"Staunen-Seiten"},
  verwandlung:{name:"Verwandlung",      ueben:"verwandlung.html",       uebenName:"Lernpfad Verwandlung"},
  bestaeubung:{name:"Bestäubung",       ueben:"bestaeubung.html",       uebenName:"Lernpfad „Wer bestäubt was?“"}
};
const BLITZ_SEKUNDEN=5*60;

/* ════════════ HILFEN ════════════ */
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function zufall(a){return a[Math.floor(Math.random()*a.length)];}

/* ════════════ FRAGEN BAUEN ════════════ */
const benutzt={art:new Set(),wissen:new Set(),verwandlung:new Set(),bestaeubung:new Set()};

function baueArt(){
  let pool=FOTO_ARTEN.filter(a=>!benutzt.art.has(a.slug));
  if(!pool.length){benutzt.art.clear();pool=FOTO_ARTEN;}
  const art=zufall(pool); benutzt.art.add(art.slug);
  const falsch=shuffle(FOTO_ARTEN.filter(a=>a.slug!==art.slug)).slice(0,3);
  return {typ:"art",art,optionen:shuffle([art,...falsch])};
}
function baueFam(){
  const grp=zufall(MEHRHEITS_GRUPPEN);
  const drei=shuffle(FOTO_ARTEN.filter(a=>a.gruppe===grp)).slice(0,3);
  const aussen=zufall(FOTO_ARTEN.filter(a=>a.gruppe!==grp));
  return {typ:"fam",grp,aussen,karten:shuffle([...drei,aussen])};
}
function baueMC(typ,pool){
  let frei=pool.map((_,i)=>i).filter(i=>!benutzt[typ].has(i));
  if(!frei.length){benutzt[typ].clear();frei=pool.map((_,i)=>i);}
  const idx=zufall(frei); benutzt[typ].add(idx);
  const f=pool[idx];
  // Optionen mischen, richtige Antwort mitführen
  const richtig=f.opts[f.ans];
  const opts=shuffle(f.opts);
  return {typ,frage:{q:f.q,opts,ans:opts.indexOf(richtig)}};
}
const BAUER={
  art:baueArt, fam:baueFam,
  wissen:()=>baueMC("wissen",WISSEN),
  verwandlung:()=>baueMC("verwandlung",VERWANDLUNG),
  bestaeubung:()=>baueMC("bestaeubung",BESTAEUBUNG)
};

const VERTEILUNG={
  9:  {art:2,fam:1,wissen:3,verwandlung:1,bestaeubung:2},
  15: {art:3,fam:2,wissen:5,verwandlung:2,bestaeubung:3}
};
function baueRunde(gesamt){
  const plan=VERTEILUNG[gesamt];
  const typen=[];
  Object.keys(plan).forEach(t=>{for(let i=0;i<plan[t];i++)typen.push(t);});
  return shuffle(typen).map(t=>BAUER[t]());
}
let blitzStapel=[];
function naechsteBlitz(){
  if(!blitzStapel.length) blitzStapel=shuffle(["art","fam","wissen","wissen","verwandlung","bestaeubung","bestaeubung"]);
  return BAUER[blitzStapel.pop()]();
}

/* ════════════ ZUSTAND ════════════ */
let modus="standard", fragen=[], aktuelle=null, index=0, gesamt=15;
let beantwortet=false, punkte=0, stats=null, restSek=0, timerId=null, autoId=null, sperrBis=0, antwortZeit=0;
const $=id=>document.getElementById(id);

function startTest(m){
  if(!ARTEN.length) return;
  modus=m; punkte=0; index=0;
  stats={art:{r:0,g:0},fam:{r:0,g:0},wissen:{r:0,g:0},verwandlung:{r:0,g:0},bestaeubung:{r:0,g:0}};
  Object.values(benutzt).forEach(s=>s.clear()); blitzStapel=[];
  $("start").style.display="none"; $("ergebnis").style.display="none"; $("frage").style.display="block";
  if(modus==="blitz"){ restSek=BLITZ_SEKUNDEN; zeigeStatus(); timerId=setInterval(tick,1000); aktuelle=naechsteBlitz(); }
  else{ gesamt=(modus==="kurz")?9:15; fragen=baueRunde(gesamt); aktuelle=fragen[0]; }
  zeigeFrage();
}
function tick(){ restSek--; zeigeStatus();
  if(restSek<=0){ clearInterval(timerId);timerId=null; if(autoId){clearTimeout(autoId);autoId=null;} zeigeErgebnis(); } }
function zeigeStatus(){
  const el=$("status");
  if(modus==="blitz"){ const m=Math.floor(Math.max(restSek,0)/60), s=Math.max(restSek,0)%60;
    el.innerHTML='✓ '+punkte+' · <span class="uhr'+(restSek<=30?' knapp':'')+'">'+m+':'+String(s).padStart(2,'0')+'</span>'; }
  else el.textContent='Frage '+(index+1)+' / '+gesamt+' · ✓ '+punkte;
}

function zeigeFrage(){
  beantwortet=false; sperrBis=Date.now()+400;
  const f=aktuelle; zeigeStatus();
  $("fort").style.width=(modus==="blitz" ? (1-restSek/BLITZ_SEKUNDEN)*100 : index/gesamt*100)+'%';
  $("chip").textContent=BEREICHE[f.typ].name;
  $("feedback").textContent=''; $("feedback").className=''; $("weiter").style.display="none";
  const fotoWrap=$("foto-wrap"), antw=$("antworten"); antw.innerHTML='';

  if(f.typ==="art"){
    $("fragetext").textContent="Welches Tier ist das?";
    fotoWrap.style.display="block";
    const img=$("foto"); img.style.opacity=0; img.style.display="none";
    $("foto-spinner").style.display="flex"; $("foto-spinner").textContent="Lädt …";
    img.dataset.stufe="foto"; img.src="../images/fotos/"+f.art.slug+".jpg";
    antw.className="zweispaltig";
    f.optionen.forEach(opt=>{
      const b=document.createElement("button"); b.className="antwort";
      b.innerHTML='<strong>'+opt.de+'</strong><br><em>'+opt.lat+'</em>';
      b.dataset.slug=opt.slug;
      b.onclick=()=>pruefe(opt.slug===f.art.slug,b,"Es war: "+f.art.de,x=>x.dataset.slug===f.art.slug);
      antw.appendChild(b);
    });
  } else if(f.typ==="fam"){
    $("fragetext").textContent="Drei dieser Tiere sind verwandt. Welches gehört nicht dazu?";
    fotoWrap.style.display="none"; antw.className="zweispaltig";
    f.karten.forEach(art=>{
      const b=document.createElement("button"); b.className="antwort mit-bild"; b.dataset.slug=art.slug;
      b.innerHTML='<img src="../images/tafeln/'+art.slug+'.jpg" alt="'+art.de+'" loading="lazy" '+
        'onerror="this.src=\'../images/fotos/'+art.slug+'.jpg\'"><span class="bildname"><strong>'+art.de+'</strong></span>';
      b.onclick=()=>pruefe(art.slug===f.aussen.slug,b,
        f.aussen.de+' gehört zu „'+f.aussen.gruppe+'“ – die anderen drei sind '+f.grp+'.',
        x=>x.dataset.slug===f.aussen.slug);
      antw.appendChild(b);
    });
  } else {
    $("fragetext").textContent=f.frage.q;
    fotoWrap.style.display="none"; antw.className="";
    f.frage.opts.forEach((opt,i)=>{
      const b=document.createElement("button"); b.className="antwort"; b.textContent=opt; b.dataset.idx=i;
      b.onclick=()=>pruefe(i===f.frage.ans,b,"Richtig wäre: "+f.frage.opts[f.frage.ans],x=>Number(x.dataset.idx)===f.frage.ans);
      antw.appendChild(b);
    });
  }
}
function fotoGeladen(){ $("foto-spinner").style.display="none"; const img=$("foto"); img.style.display="inline"; img.style.opacity=1; }
function fotoFehler(){
  const img=$("foto");
  if(aktuelle&&aktuelle.typ==="art"&&img.dataset.stufe==="foto"){ img.dataset.stufe="tafel"; img.src="../images/tafeln/"+aktuelle.art.slug+".jpg"; }
  else $("foto-spinner").textContent="(kein Bild verfügbar)";
}

function pruefe(richtig,geklickt,aufloesung,istRichtiger){
  if(beantwortet||Date.now()<sperrBis) return;
  beantwortet=true; antwortZeit=Date.now();
  const typ=aktuelle.typ; stats[typ].g++;
  document.querySelectorAll(".antwort").forEach(b=>{ b.disabled=true; if(istRichtiger(b)) b.classList.add("richtig"); });
  const fb=$("feedback");
  if(richtig){ punkte++; stats[typ].r++; fb.textContent="✓ Richtig!"; fb.className="ok"; }
  else{ geklickt.classList.add("falsch"); fb.textContent="✗ "+aufloesung; fb.className="fehler"; }
  zeigeStatus();
  if(modus==="blitz") autoId=setTimeout(naechste,richtig?900:2200);
  else $("weiter").style.display="inline-block";
}
$("frage").addEventListener("click",()=>{
  if(modus!=="blitz"||!beantwortet||!autoId) return;
  if(Date.now()-antwortZeit<300) return;
  clearTimeout(autoId); autoId=null; naechste();
});
function naechste(){
  if(autoId){clearTimeout(autoId);} autoId=null;
  if(modus==="blitz"){ if(restSek<=0) return; aktuelle=naechsteBlitz(); zeigeFrage(); return; }
  index++;
  if(index>=gesamt) zeigeErgebnis();
  else{ aktuelle=fragen[index]; zeigeFrage(); }
}

/* ════════════ FEUERWERK + FANFARE ════════════ */
function feuerwerk(){
  const feld=$("feuerwerk"); feld.style.display="block"; feld.innerHTML="";
  const farben=['#C28A3A','#233D5C','#3E9A5E','#e8a020','#3498db','#9b59b6','#e74c3c','#f4c430'];
  for(let r=0;r<5;r++){
    const cx=12+Math.random()*76, cy=15+Math.random()*55, start=r*0.5;
    for(let i=0;i<24;i++){
      const fu=document.createElement("span"); fu.className="funke";
      const w=(i/24)*2*Math.PI+Math.random()*0.25, weite=32+Math.random()*48;
      fu.style.cssText='left:'+cx+'%;top:'+cy+'%;background:'+farben[(Math.random()*farben.length)|0]+';'+
        '--dx:'+(Math.cos(w)*weite).toFixed(1)+'px;--dy:'+(Math.sin(w)*weite).toFixed(1)+'px;'+
        'animation-delay:'+(start+Math.random()*0.12).toFixed(2)+'s';
      feld.appendChild(fu);
    }
  }
  setTimeout(()=>{feld.style.display="none";feld.innerHTML="";},4200);
}
function fanfare(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;
    const ctx=new Ctx(); if(ctx.state==="suspended") ctx.resume();
    const t0=ctx.currentTime+0.05;
    [[523.25,0,0.16,0.2],[659.25,0.15,0.16,0.2],[783.99,0.30,0.16,0.2],[1046.5,0.46,0.65,0.22],[783.99,0.46,0.65,0.12]]
    .forEach(([fr,st,du,vo])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="triangle";o.frequency.value=fr;
      g.gain.setValueAtTime(0,t0+st);g.gain.linearRampToValueAtTime(vo,t0+st+0.02);g.gain.exponentialRampToValueAtTime(0.001,t0+st+du);
      o.connect(g).connect(ctx.destination);o.start(t0+st);o.stop(t0+st+du+0.05);});
    setTimeout(()=>ctx.close().catch(()=>{}),1800);
  }catch(e){}
}

function zeigeErgebnis(){
  $("frage").style.display="none"; $("ergebnis").style.display="block";
  $("fort").style.width="100%"; $("status").textContent="";
  const ges=Object.keys(stats).reduce((s,k)=>s+stats[k].g,0);
  $("score").textContent=punkte+" / "+ges;
  const sp=$("sieger-platz");
  if(ges>0&&punkte===ges){
    const sprueche=["🎆 Fehlerfrei durch alle Themen – das ganze Insektenreich applaudiert!",
      "🏆 Volltreffer auf ganzer Linie – du bist eine wandelnde Fauna!",
      "🎇 Alles richtig! Selbst die Hummel zieht den Hut.",
      "🌟 Perfekt – quer durch die App und kein einziger Patzer."];
    sp.innerHTML='<div class="sieger">'+sprueche[(Math.random()*sprueche.length)|0]+'</div>';
    feuerwerk(); fanfare();
  } else sp.innerHTML="";
  const pct=ges>0?punkte/ges:0; let msg;
  if(ges===0) msg="Das ging schnell – diesmal kam keine Frage bis zur Antwort.";
  else if(pct===1) msg="";
  else if(pct>=0.8) msg="Sehr stark! Du kennst dich fast überall bestens aus.";
  else if(pct>=0.6) msg="Gutes Fundament – unten siehst du, wo noch Luft ist.";
  else if(pct>=0.4) msg="Solider Anfang. Die Übungs-Links unten helfen weiter.";
  else msg="Noch viel zu entdecken – jede Kachel der App hilft beim Üben!";
  $("ergebnis-msg").textContent=msg;
  const wrap=$("bereiche"); wrap.innerHTML="";
  Object.keys(BEREICHE).forEach(typ=>{
    const s=stats[typ]; if(s.g===0&&modus==="blitz") return;
    if(s.g===0) return;
    const b=BEREICHE[typ], anteil=s.g>0?s.r/s.g*100:0;
    const z=document.createElement("div"); z.className="bz";
    z.innerHTML='<span class="bn">'+b.name+'</span><span class="bw">'+s.r+' / '+s.g+'</span>'+
      '<div class="bwrap"><div class="bbar" style="width:'+anteil+'%"></div></div>'+
      (s.r<s.g?'<span class="buben">Zum Üben: <a href="'+b.ueben+'">'+b.uebenName+' →</a></span>':'');
    wrap.appendChild(z);
  });
}
function zurueck(){
  if(timerId){clearInterval(timerId);timerId=null;} if(autoId){clearTimeout(autoId);autoId=null;}
  $("feuerwerk").style.display="none"; $("sieger-platz").innerHTML="";
  $("ergebnis").style.display="none"; $("frage").style.display="none"; $("start").style.display="block";
  $("fort").style.width="0%"; $("status").textContent="";
}

/* ════════════ INIT ════════════ */
$("weiter").addEventListener("click",naechste);
$("neu").addEventListener("click",zurueck);
document.querySelectorAll(".modus").forEach(b=>b.addEventListener("click",()=>startTest(b.dataset.m)));

fetch("../tiere.json").then(r=>r.json()).then(d=>{
  ARTEN=d.map(t=>({slug:t.slug,de:t.deutsch,lat:t.lat,gruppe:t.gruppe,foto:!!t.foto}));
  FOTO_ARTEN=ARTEN.filter(a=>a.foto);
  GRUPP_COUNT={}; FOTO_ARTEN.forEach(a=>{GRUPP_COUNT[a.gruppe]=(GRUPP_COUNT[a.gruppe]||0)+1;});
  MEHRHEITS_GRUPPEN=Object.keys(GRUPP_COUNT).filter(g=>GRUPP_COUNT[g]>=3 && g!=="Andere");
  document.querySelectorAll(".modus").forEach(b=>b.disabled=false);
}).catch(()=>{});
</script>
