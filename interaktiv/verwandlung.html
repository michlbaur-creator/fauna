<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Verwandlung — Lernpfad · Fauna Mibaso</title>
<meta name="description" content="Lernpfad in 5 Schritten: vollständige und unvollständige Verwandlung – vom Ei zum Falter.">
<meta name="theme-color" content="#233D5C">
<style>
  :root{
    --blau:#233D5C; --blau-tief:#1a2f47; --creme:#F7F3E8; --creme-tief:#EEE7D5;
    --pergament:#EDE3CC; --tinte:#1c2e42; --honig:#C28A3A; --linie:#c3ccd5;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;background:var(--creme);color:var(--blau);
    font-family:Georgia,"Times New Roman",serif;line-height:1.5;}
  .huelle{max-width:640px;margin:0 auto;padding:clamp(10px,3vw,20px) clamp(12px,3.5vw,28px) 48px;}

  /* Kopf */
  .kopf{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .zurueck{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--blau);
    text-decoration:none;display:inline-flex;gap:5px;align-items:center;}
  .zaehler{font-family:var(--sans);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#8a96a1;}
  h1{font-size:clamp(22px,5.2vw,31px);line-height:1.06;margin:6px 0 2px;font-weight:normal;}
  .unter{font-size:clamp(13.5px,3.6vw,15.5px);color:var(--tinte);margin:0;max-width:48ch;}

  /* Schritt-Chips */
  .chips{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding:10px 2px 4px;margin:2px -2px 0;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;display:flex;align-items:center;gap:7px;cursor:pointer;
    font-family:var(--sans);font-size:12.5px;color:#5a6675;background:#fff;
    border:1px solid var(--linie);border-radius:999px;padding:7px 13px 7px 8px;white-space:nowrap;
    transition:border-color .15s,color .15s,background .15s;}
  .chip .nr{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
    border-radius:50%;background:var(--creme-tief);color:#8a96a1;font-weight:700;font-size:11.5px;}
  .chip.aktiv{background:var(--blau);color:var(--creme);border-color:var(--blau);}
  .chip.aktiv .nr{background:var(--honig);color:#fff;}
  .chip.fertig:not(.aktiv) .nr{background:#cfe0d2;color:#3e7a55;}

  /* Bühne / Illustration */
  .buehne{margin-top:10px;}
  .bildbox{position:relative;width:min(100%,400px);aspect-ratio:1/1;max-height:50vh;margin:0 auto;}
  .bild{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;}
  .bild.an{opacity:1;}
  .bild img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    background:var(--pergament);border:1px solid #cdbf9e;border-radius:10px;}
  .bild img.weg{display:none;}
  .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;text-align:center;background:var(--pergament);border:1px dashed #cdbf9e;border-radius:10px;padding:14px;}
  .ph .gl{font-size:34px;line-height:1;opacity:.55;}
  .ph .l{font-family:var(--sans);font-size:13px;font-weight:600;color:#7a6a48;}
  .ph .f{font-family:var(--sans);font-size:10.5px;color:#a99a78;word-break:break-all;}

  /* Hotspots */
  .hotspot{position:absolute;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;
    background:var(--honig);color:#fff;border:2px solid #fff;box-shadow:0 2px 7px rgba(35,61,92,.28);
    font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:3;animation:puls 2.4s infinite;}
  .hotspot.aktiv{background:var(--blau);animation:none;}
  @keyframes puls{0%{box-shadow:0 2px 7px rgba(35,61,92,.28),0 0 0 0 rgba(194,138,58,.5);}
    70%{box-shadow:0 2px 7px rgba(35,61,92,.28),0 0 0 11px rgba(194,138,58,0);}100%{box-shadow:0 2px 7px rgba(35,61,92,.28),0 0 0 0 rgba(194,138,58,0);}}

  /* Sequenz-Steuerung */
  .seq{margin-top:12px;}
  .seqkopf{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .playbtn{flex:0 0 auto;width:40px;height:40px;border-radius:50%;border:1px solid var(--blau);
    background:var(--blau);color:var(--creme);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .playbtn:hover{background:var(--blau-tief);}
  .stufenlabel{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--blau);}
  .stufenlabel small{font-weight:400;color:#8a96a1;}
  input[type=range].scrub{flex:1 1 auto;-webkit-appearance:none;appearance:none;height:6px;border-radius:999px;
    background:linear-gradient(90deg,var(--honig) var(--p,0%),var(--creme-tief) var(--p,0%));outline:none;margin:0;}
  input[type=range].scrub::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:var(--blau);border:3px solid var(--creme);box-shadow:0 1px 4px rgba(35,61,92,.35);cursor:pointer;}
  input[type=range].scrub::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--blau);
    border:3px solid var(--creme);cursor:pointer;}
  .scrubnote{font-family:var(--sans);font-size:11.5px;color:#9aa6b0;margin:6px 2px 0;}

  /* Erklärtext + entdecken */
  .erklaer{margin-top:12px;}
  .erklaer h2{font-size:clamp(18px,5vw,23px);font-weight:normal;margin:0 0 7px;}
  .erklaer p{font-size:clamp(14.5px,4vw,16.5px);color:var(--tinte);margin:0 0 10px;}
  .entdeckhint{font-family:var(--sans);font-size:12.5px;color:var(--honig);font-weight:600;margin:4px 0 0;}
  .infokarte{margin-top:12px;padding:13px 15px;border-radius:0 12px 12px 0;background:var(--creme-tief);
    border-left:4px solid var(--honig);min-height:30px;}
  .infokarte .it{font-family:var(--sans);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8a96a1;margin:0 0 3px;}
  .infokarte h3{margin:0 0 4px;font-size:17px;font-weight:normal;}
  .infokarte p{margin:0;font-size:14.5px;color:var(--tinte);}
  .infokarte .leer{color:#8a96a1;font-style:italic;font-family:var(--sans);font-size:13px;}

  .absprung{display:inline-flex;align-items:center;gap:7px;margin-top:14px;
    font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--creme);background:var(--blau);
    border-radius:999px;padding:10px 16px;text-decoration:none;}
  .absprung:hover{background:var(--blau-tief);}

  .schluepfbtn{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--blau);background:transparent;
    border:1px solid var(--blau);border-radius:999px;padding:9px 15px;cursor:pointer;margin-top:12px;}
  .schluepfbtn:hover{background:var(--blau);color:var(--creme);}
  /* Schlüpf-Animation: Flügel entfalten */
  .falter-unfold{transform-origin:center;}
  .falter-unfold.zu{transform:scaleX(.08);opacity:.5;}
  .falter-unfold.auf{transform:scaleX(1);opacity:1;transition:transform 1.4s cubic-bezier(.2,.7,.3,1),opacity 1.4s;}

  /* Vergleich (Schritt 5) */
  .umschalter{display:flex;gap:8px;margin:4px 0 14px;}
  .umschalter button{flex:1 1 0;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--blau);
    background:#fff;border:1px solid var(--linie);border-radius:11px;padding:11px 8px;cursor:pointer;line-height:1.25;}
  .umschalter button.an{background:var(--blau);color:var(--creme);border-color:var(--blau);}
  .vweg{margin-bottom:14px;}
  .vweg .reihe{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-family:var(--sans);font-size:12.5px;}
  .vweg .st{background:var(--creme-tief);border-radius:9px;padding:7px 11px;color:var(--blau);font-weight:600;}
  .vweg .ar{color:var(--honig);font-size:16px;}
  .gruppen{font-family:var(--sans);font-size:13.5px;color:var(--tinte);margin:0 0 6px;}
  .gruppen b{color:var(--blau);}
  .quiz{margin-top:14px;}
  .quiz .ql{font-family:var(--sans);font-size:12.5px;color:#6f7b86;margin:0 0 8px;}
  .quizchips{display:flex;flex-wrap:wrap;gap:8px;}
  .quizchips button{font-family:var(--sans);font-size:13px;color:var(--blau);background:#fff;
    border:1px solid var(--linie);border-radius:999px;padding:8px 13px;cursor:pointer;transition:.15s;}
  .quizchips button.voll{background:#e6efe7;border-color:#bcd6c0;color:#2f6a45;}
  .quizchips button.unvoll{background:#efe7da;border-color:#dcc9a8;color:#9a6a2a;}
  .quizchips button .tag{font-size:11px;margin-left:6px;opacity:.85;}

  /* Navigation */
  .nav{display:flex;gap:9px;margin-top:24px;padding-top:16px;border-top:1px solid var(--linie);}
  .knopf{font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--blau);background:transparent;
    border:1px solid var(--blau);border-radius:999px;padding:10px 16px;cursor:pointer;transition:background .18s,color .18s;}
  .knopf:hover:not(:disabled){background:var(--blau);color:var(--creme);}
  .knopf:disabled{opacity:.38;cursor:default;}
  .knopf.prim{background:var(--blau);color:var(--creme);margin-left:auto;}
  .knopf.prim:hover{background:var(--blau-tief);color:var(--creme);}

  footer{margin-top:30px;font-family:var(--sans);font-size:12px;color:#8a96a1;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
  body{padding-top:env(safe-area-inset-top);}
</style>
</head>
<body>
<div class="huelle">
  <div class="kopf">
    <a class="zurueck" href="../index.html">‹ Startseite</a>
    <span class="zaehler" id="zaehler">Schritt 1 / 5</span>
  </div>
  <h1>Verwandlung</h1>
  <p class="unter">Vom Ei zum Falter – und der zweite Weg ohne Puppe.</p>

  <div class="chips" id="chips"></div>

  <div class="buehne" id="buehne"></div>
  <div class="erklaer" id="erklaer"></div>

  <div class="nav">
    <button class="knopf" id="zurueckBtn">‹ Zurück</button>
    <button class="knopf prim" id="weiterBtn">Nächster Schritt ›</button>
  </div>

  <footer>© 2026 Michael Baur · Fauna Mibaso</footer>
</div>

<script>
/* ===========================================================================
   Lernpfad „Verwandlung" – Gerüst. Bilder gehören nach ../assets/verwandlung/.
   Fehlt ein Bild, zeigt das Gerüst einen Platzhalter mit dem erwarteten Namen.

   Datenmodell pro Schritt:
   { chip, titel, text, hint?, typ, ... }
     typ "tafel"   : ein Bild + antippbare Hotspots (+ optional schluepfen:true)
     typ "sequenz" : mehrere Stadien, Schieberegler + Play, je Stadium Bildunterschrift
     typ "vergleich": Sonderansicht mit Umschalter + Mini-Quiz
   Bild-Slot:  {src, label, glyph}
=========================================================================== */
const BASIS = "../assets/verwandlung/";

const SCHRITTE = [
  /* 1 */ {
    chip:"Zwei Wege", titel:"Was heißt Verwandlung?",
    text:"Viele Insekten leben zwei ganz verschiedene Leben: erst als gefräßige Larve, dann als erwachsenes, meist geflügeltes Tier (Imago). Dazwischen liegt die Verwandlung – die Metamorphose. Dafür gibt es in der Insektenwelt zwei Wege.",
    hint:"Tippe die Punkte im Bild an.",
    typ:"tafel",
    bild:{src:"start-zwei-wege.png", label:"Raupe & Falter nebeneinander", glyph:"🐛"},
    hotspots:[
      {x:27,y:62,n:1,titel:"Larve",text:"Das jugendliche Fress-Stadium – Raupe, Engerling oder Made. Sieht oft völlig anders aus als das fertige Tier."},
      {x:73,y:38,n:2,titel:"Imago",text:"Das erwachsene, geschlechtsreife Insekt – meist geflügelt. Seine Aufgabe: Partner finden und für Nachwuchs sorgen."},
    ]
  },
  /* 2 */ {
    chip:"Mit Puppe", titel:"Vollständige Verwandlung",
    text:"Der Weg der Schmetterlinge, Käfer, Bienen und Fliegen führt über vier sehr verschiedene Gestalten. Zieh den Regler von links nach rechts – oder lass es ablaufen.",
    hint:"Regler ziehen oder ▶ drücken.",
    typ:"sequenz",
    absprung:{text:"Den ganzen Kreislauf beim Admiral ansehen ›", url:"../arten/admiral.html"},
    stufen:[
      {name:"Ei", bild:{src:"voll-1-ei.png", label:"Eier an der Brennnessel", glyph:"🥚"},
       text:"Alles beginnt klein. Das Weibchen klebt die Eier an die Futterpflanze – beim Tagpfauenauge an die Brennnessel."},
      {name:"Raupe", bild:{src:"voll-2-raupe.png", label:"Raupe (Larve)", glyph:"🐛"},
       text:"Eine Fressmaschine. Die Raupe häutet sich mehrfach und wird dabei immer größer."},
      {name:"Puppe", bild:{src:"voll-3-puppe.png", label:"Puppe", glyph:"🛡️"},
       text:"Scheinbare Ruhe: Außen reglos, doch im Inneren wird der ganze Körper umgebaut."},
      {name:"Falter", bild:{src:"voll-4-falter.png", label:"Falter (Imago)", glyph:"🦋"},
       text:"Fertig verwandelt schlüpft der Falter, pumpt die Flügel prall und fliegt davon."},
    ]
  },
  /* 3 */ {
    chip:"Die Puppe", titel:"Das Wunder dazwischen",
    text:"In der Puppe geschieht das eigentliche Wunder: Der Raupenkörper wird fast vollständig aufgelöst und neu zusammengesetzt. Aus wenigen Zellgruppen wachsen Flügel, Beine und Fühler des Falters.",
    hint:"Tippe die Punkte an – und sieh den Falter schlüpfen.",
    typ:"tafel", schluepfen:true,
    bild:{src:"voll-3-puppe.png", label:"Puppe (Detail)", glyph:"🛡️"},
    schluepfBild:{src:"voll-5-schluepft.png", label:"Falter schlüpft", glyph:"🦋"},
    hotspots:[
      {x:50,y:53,n:1,titel:"Puppenhülle",text:"Eine feste Schutzhülle. Bei vielen Tagfaltern hängt sie kopfüber – die Stürzpuppe."},
      {x:51,y:65,n:2,titel:"Flügelanlagen",text:"Schon von außen ahnt man die Flügel – als feine Linien auf der Hülle."},
      {x:52,y:77,n:3,titel:"Schlüpfnaht",text:"Hier reißt die Hülle auf, wenn der fertige Falter sich herausschiebt."},
    ]
  },
  /* 4 */ {
    chip:"Ohne Puppe", titel:"Unvollständige Verwandlung",
    text:"Libellen, Heuschrecken und Wanzen gehen den anderen Weg: ganz ohne Puppe. Die Jungen ähneln den Erwachsenen schon – sie werden nur größer.",
    hint:"Regler ziehen oder ▶ drücken.",
    typ:"sequenz",
    absprung:{text:"Im Stammbaum: die Hemimetabola ›", url:"../interaktiv/stammbaum.html"},
    stufen:[
      {name:"Ei", bild:{src:"unvoll-1-ei.png", label:"Eier / Gelege", glyph:"🥚"},
       text:"Auch hier am Anfang das Ei, oft im Boden oder an Pflanzen abgelegt."},
      {name:"Nymphe", bild:{src:"unvoll-2-nymphe.png", label:"Nymphe (Larvenstadium)", glyph:"🦗"},
       text:"Die Nymphe sieht dem erwachsenen Tier schon ähnlich, nur kleiner und ohne fertige Flügel. Mit jeder Häutung wächst sie, die Flügelscheiden werden größer."},
      {name:"Imago", bild:{src:"unvoll-3-imago.png", label:"Imago (erwachsen)", glyph:"🦗"},
       text:"Nach der letzten Häutung ist das Tier erwachsen und voll geflügelt. Eine Puppe gab es nie."},
    ]
  },
  /* 5 */ {
    chip:"Vergleich", titel:"Zwei Wege im Vergleich",
    text:"Der ganze Unterschied steckt in einem einzigen Schritt: der Puppe. Mit ihr wird aus der Raupe ein völlig neues Tier – ohne sie wächst die Nymphe nur Stück für Stück heran.",
    typ:"vergleich"
  },
];

/* Insekten fürs Mini-Quiz in Schritt 5 */
const QUIZTIERE = [
  {t:"Schmetterling", w:"voll"}, {t:"Marienkäfer", w:"voll"},
  {t:"Biene", w:"voll"}, {t:"Stubenfliege", w:"voll"},
  {t:"Libelle", w:"unvoll"}, {t:"Heuschrecke", w:"unvoll"}, {t:"Feuerwanze", w:"unvoll"},
];

/* ---- Bausteine ---- */
function bildHTML(b, klasse){
  return '<div class="bild '+(klasse||'')+'">'+
    '<div class="ph"><span class="gl">'+b.glyph+'</span>'+
      '<span class="l">'+b.label+'</span><span class="f">assets/verwandlung/'+b.src+'</span></div>'+
    '<img src="'+BASIS+b.src+'" alt="'+b.label+'" onerror="this.classList.add(\'weg\')">'+
  '</div>';
}

const elB=document.getElementById("buehne");
const elE=document.getElementById("erklaer");
const elChips=document.getElementById("chips");
const elZaehler=document.getElementById("zaehler");
let i=0;           // aktueller Schritt
let stufe=0;       // aktuelles Stadium (Sequenz)
let timer=null;    // Auto-Play
const reduce=window.matchMedia("(prefers-reduced-motion:reduce)").matches;

function chips(){
  elChips.innerHTML="";
  SCHRITTE.forEach((s,k)=>{
    const c=document.createElement("button");
    c.className="chip"+(k===i?" aktiv":"")+(k<i?" fertig":"");
    c.innerHTML='<span class="nr">'+(k+1)+'</span>'+s.chip;
    c.addEventListener("click",()=>geheZu(k));
    elChips.appendChild(c);
  });
  elZaehler.textContent="Schritt "+(i+1)+" / "+SCHRITTE.length;
}

function render(){
  stopPlay();
  const s=SCHRITTE[i];
  if(s.typ==="sequenz") renderSequenz(s);
  else if(s.typ==="vergleich") renderVergleich(s);
  else renderTafel(s);
  document.getElementById("zurueckBtn").disabled = (i===0);
  const wb=document.getElementById("weiterBtn");
  wb.textContent = (i===SCHRITTE.length-1) ? "↺ Von vorn" : "Nächster Schritt ›";
  chips(); melde();
}

/* --- Tafel mit Hotspots --- */
function renderTafel(s){
  let html='<div class="bildbox">'+bildHTML(s.bild,"an");
  if(s.schluepfen && s.schluepfBild) html+=bildHTML(s.schluepfBild,"")
    .replace('class="bild "','class="bild falter-unfold zu" id="schluepfBild" style="opacity:0;"');
  s.hotspots.forEach(h=>{
    html+='<button class="hotspot" data-n="'+h.n+'" style="left:'+h.x+'%;top:'+h.y+'%;">'+h.n+'</button>';
  });
  html+='</div>';
  elB.innerHTML=html;

  let e='<h2>'+s.titel+'</h2><p>'+s.text+'</p>';
  if(s.hint) e+='<p class="entdeckhint">👇 '+s.hint+'</p>';
  if(s.schluepfen) e+='<button class="schluepfbtn" id="schluepfBtn">▶ Schlüpfen ansehen</button>';
  e+='<div class="infokarte" id="info"><p class="leer">Tippe eine Zahl im Bild an.</p></div>';
  if(s.absprung) e+='<a class="absprung" href="'+s.absprung.url+'">'+s.absprung.text+'</a>';
  elE.innerHTML=e;

  const info=document.getElementById("info");
  elB.querySelectorAll(".hotspot").forEach(b=>{
    b.addEventListener("click",()=>{
      elB.querySelectorAll(".hotspot").forEach(x=>x.classList.remove("aktiv"));
      b.classList.add("aktiv");
      const h=s.hotspots.find(z=>z.n==b.dataset.n);
      info.innerHTML='<p class="it">Punkt '+h.n+'</p><h3>'+h.titel+'</h3><p>'+h.text+'</p>';
      info.scrollIntoView({block:"nearest", behavior:reduce?"auto":"smooth"});
      melde();
    });
  });
  const sb=document.getElementById("schluepfBtn");
  if(sb) sb.addEventListener("click",()=>{
    const img=document.getElementById("schluepfBild");
    if(!img) return;
    img.style.opacity="1";
    img.classList.remove("zu"); void img.offsetWidth; img.classList.add("auf");
    elB.querySelectorAll(".hotspot").forEach(h=>{ h.style.transition="opacity .5s"; h.style.opacity="0"; setTimeout(()=>h.style.display="none",500); });
    sb.disabled=true; sb.textContent="🦋 geschlüpft"; melde();
  });
}

/* --- Sequenz mit Schieberegler --- */
function renderSequenz(s){
  stufe=0;
  let html='<div class="bildbox">';
  s.stufen.forEach((st,k)=>{ html+=bildHTML(st.bild, k===0?"an":""); });
  html+='</div>';
  elB.innerHTML=html;

  const max=s.stufen.length-1;
  let e='<h2>'+s.titel+'</h2><p>'+s.text+'</p>';
  if(s.hint) e+='<p class="entdeckhint">👇 '+s.hint+'</p>';
  e+='<div class="seq"><div class="seqkopf">'+
       '<button class="playbtn" id="play" aria-label="Abspielen">▶</button>'+
       '<input type="range" class="scrub" id="scrub" min="0" max="'+max+'" value="0" step="1">'+
     '</div>'+
     '<div class="stufenlabel" id="stl"></div>'+
     '<div class="infokarte" id="info"></div>'+
     '<p class="scrubnote">Stadium '+(1)+' von '+(max+1)+'</p></div>';
  if(s.absprung) e+='<a class="absprung" href="'+s.absprung.url+'">'+s.absprung.text+'</a>';
  elE.innerHTML=e;

  const scrub=document.getElementById("scrub");
  const setze=(v)=>{
    stufe=Math.max(0,Math.min(max,v));
    scrub.value=stufe;
    scrub.style.setProperty("--p",(stufe/max*100)+"%");
    elB.querySelectorAll(".bild").forEach((b,k)=>b.classList.toggle("an",k===stufe));
    const st=s.stufen[stufe];
    document.getElementById("stl").innerHTML=st.name+' <small>· Stadium '+(stufe+1)+'/'+(max+1)+'</small>';
    document.getElementById("info").innerHTML='<p>'+st.text+'</p>';
    elE.querySelector(".scrubnote").textContent="Stadium "+(stufe+1)+" von "+(max+1);
    melde();
  };
  scrub.addEventListener("input",()=>setze(+scrub.value));
  document.getElementById("play").addEventListener("click",function(){
    if(timer){ stopPlay(); this.textContent="▶"; return; }
    this.textContent="❚❚";
    if(stufe>=max) setze(0);
    timer=setInterval(()=>{
      if(stufe>=max){ stopPlay(); document.getElementById("play").textContent="▶"; return; }
      setze(stufe+1);
    }, reduce?600:1100);
  });
  setze(0);
}

/* --- Vergleich (Schritt 5) --- */
function renderVergleich(s){
  elB.innerHTML="";
  const wegVoll='<div class="vweg"><div class="reihe">'+
    '<span class="st">Ei</span><span class="ar">→</span><span class="st">Raupe</span>'+
    '<span class="ar">→</span><span class="st" style="background:#e6efe7;color:#2f6a45;">Puppe</span>'+
    '<span class="ar">→</span><span class="st">Falter</span></div></div>';
  const wegUnvoll='<div class="vweg"><div class="reihe">'+
    '<span class="st">Ei</span><span class="ar">→</span><span class="st">Nymphe</span>'+
    '<span class="ar">→</span><span class="st">Nymphe</span><span class="ar">→</span><span class="st">Imago</span></div>'+
    '<p class="scrubnote">keine Puppe – die Nymphe wächst über mehrere Häutungen heran</p></div>';

  let e='<h2>'+s.titel+'</h2><p>'+s.text+'</p>'+
    '<div class="umschalter">'+
      '<button id="bVoll" class="an">Mit Puppe<br><small>vollständig</small></button>'+
      '<button id="bUnvoll">Ohne Puppe<br><small>unvollständig</small></button>'+
    '</div>'+
    '<div id="wegBox">'+wegVoll+'</div>'+
    '<p class="gruppen" id="grp"></p>'+
    '<div class="quiz"><p class="ql">Mini-Check: Tippe ein Insekt – welcher Weg ist es?</p><div class="quizchips" id="qz"></div></div>'+
    '<a class="absprung" href="../interaktiv/stammbaum.html">Im Stammbaum: beide Äste zeigen ›</a>';
  elE.innerHTML=e;

  const grpVoll='<b>Mit Puppe (vollständig):</b> Schmetterlinge · Käfer · Bienen &amp; Wespen · Fliegen &amp; Mücken';
  const grpUnvoll='<b>Ohne Puppe (unvollständig):</b> Libellen · Heuschrecken · Wanzen &amp; Zikaden';
  const grp=document.getElementById("grp");
  const wegBox=document.getElementById("wegBox");
  const bV=document.getElementById("bVoll"), bU=document.getElementById("bUnvoll");
  function zeige(v){
    bV.classList.toggle("an",v); bU.classList.toggle("an",!v);
    wegBox.innerHTML=v?wegVoll:wegUnvoll;
    grp.innerHTML=v?grpVoll:grpUnvoll; melde();
  }
  bV.addEventListener("click",()=>zeige(true));
  bU.addEventListener("click",()=>zeige(false));
  zeige(true);

  const qz=document.getElementById("qz");
  QUIZTIERE.forEach(t=>{
    const b=document.createElement("button");
    b.textContent=t.t;
    b.addEventListener("click",()=>{
      b.classList.add(t.w);
      b.querySelector(".tag")||b.insertAdjacentHTML("beforeend",
        '<span class="tag">'+(t.w==="voll"?"mit Puppe":"ohne Puppe")+'</span>');
      melde();
    });
    qz.appendChild(b);
  });
}

/* ---- Navigation ---- */
function geheZu(k){ if(k<0||k>=SCHRITTE.length) return; i=k; render(); window.scrollTo({top:0,behavior:reduce?"auto":"smooth"}); }
function stopPlay(){ if(timer){clearInterval(timer);timer=null;} }
document.getElementById("zurueckBtn").addEventListener("click",()=>geheZu(i-1));
document.getElementById("weiterBtn").addEventListener("click",()=>{
  if(i===SCHRITTE.length-1) geheZu(0); else geheZu(i+1);
});

/* Wischen zwischen Schritten (außer auf Regler/Knopf/Hotspot) */
let tx=0,ty=0,tig=false;
document.addEventListener("touchstart",e=>{
  if(e.target.closest("input,button,a,.hotspot")){tig=false;return;}
  tig=true; tx=e.touches[0].clientX; ty=e.touches[0].clientY;
},{passive:true});
document.addEventListener("touchend",e=>{
  if(!tig) return; tig=false;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.6){ geheZu(i+(dx<0?1:-1)); }
},{passive:true});

/* Höhe an iframe melden */
function melde(){
  if(window.parent!==window){
    try{ window.parent.postMessage({fauna:"height", height:document.body.scrollHeight}, "*"); }catch(e){}
  }
}
if("ResizeObserver" in window){ new ResizeObserver(melde).observe(document.body); }
window.addEventListener("load", melde);

render();
</script>
